<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Green Monochrome WebXR AR Simulator</title>
  <link rel="stylesheet" href="./style.css" />
  <!--
    WebXR support note:
    - immersive-ar usually requires a supported mobile browser/device, HTTPS or localhost, and camera permission.
    - Camera passthrough is only available in a real AR-capable WebXR session.
    - On desktop or unsupported devices, this page falls back to a non-AR simulator with the same HUD and green monochrome styling.
  -->
</head>
<body>
  <div id="app"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>

  <section id="launcher" class="hidden">
    <h1>Monochrome AR HUD</h1>
    <p>Use WebXR AR when available, or start the fallback simulator.</p>
    <div class="controls">
      <div class="row">
        <label for="brightness">Brightness</label>
        <input id="brightness" type="range" min="0.35" max="1.7" step="0.01" value="1.05" />
        <div class="value" data-value-for="brightness"></div>
      </div>
      <div class="row">
        <label for="contrast">Contrast</label>
        <input id="contrast" type="range" min="0.6" max="2.3" step="0.01" value="1.15" />
        <div class="value" data-value-for="contrast"></div>
      </div>
      <div class="row">
        <label for="glow">Glow</label>
        <input id="glow" type="range" min="0" max="1.4" step="0.01" value="0.45" />
        <div class="value" data-value-for="glow"></div>
      </div>
      <div class="row">
        <label for="lineThickness">HUD Scale</label>
        <input id="lineThickness" type="range" min="0.4" max="2.6" step="0.01" value="1.2" />
        <div class="value" data-value-for="lineThickness"></div>
      </div>
      <div class="row toggle">
        <label for="scanlineToggle">Scanlines</label>
        <input id="scanlineToggle" type="checkbox" checked />
      </div>
    </div>
    <div class="buttons">
      <button id="startSimButton">Start Simulator</button>
      <div id="xrButtonHost"></div>
    </div>
  </section>
  <div id="touchHint">Drag to look around.</div>

  <script type="module">
    import { ARGlassSim } from './ARGlassSim.js';
    import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
    import { ARButton } from 'https://unpkg.com/three@0.164.1/examples/jsm/webxr/ARButton.js';

    const app = document.getElementById('app');
    const launcher = document.getElementById('launcher');
    const touchHint = document.getElementById('touchHint');
    const xrButtonHost = document.getElementById('xrButtonHost');
    const scanlinesEl = document.getElementById('scanlines');

    const controls = {
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      glow: document.getElementById('glow'),
      lineThickness: document.getElementById('lineThickness'),
      scanlines: document.getElementById('scanlineToggle'),
      startSimButton: document.getElementById('startSimButton'),
    };

    const sim = new ARGlassSim({
      THREE,
      ARButton,
      mount: app,
      launcher,
      touchHint,
      xrButtonHost,
      scanlinesEl,
      controls,
      valueLabelRoot: document,
    });

    sim.start();
  </script>
</body>
</html>
