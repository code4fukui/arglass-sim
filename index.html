<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Green Monochrome WebXR AR Simulator</title>
  <!--
    WebXR support note:
    - immersive-ar usually requires a supported mobile browser/device, HTTPS or localhost, and camera permission.
    - Camera passthrough is only available in a real AR-capable WebXR session.
    - On desktop or unsupported devices, this page falls back to a non-AR simulator with the same HUD and green monochrome styling.
  -->
  <style>
    :root {
      --bg: #020402;
      --panel: rgba(5, 12, 6, 0.92);
      --panel-border: rgba(90, 255, 140, 0.22);
      --green-main: rgba(110, 255, 150, 0.95);
      --green-soft: rgba(90, 255, 140, 0.50);
      --green-faint: rgba(70, 180, 100, 0.18);
      --glow-size: 8px;
      --line-alpha: 0.9;
      --scanline-opacity: 0.07;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(25, 70, 35, 0.18), transparent 38%),
        linear-gradient(180deg, #040704 0%, #010201 100%);
      color: var(--green-main);
      font-family: "Courier New", Courier, monospace;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(120, 255, 160, 0.10) 0px,
          rgba(120, 255, 160, 0.10) 1px,
          rgba(0, 0, 0, 0.0) 2px,
          rgba(0, 0, 0, 0.0) 4px
        );
      mix-blend-mode: screen;
      transition: opacity 120ms ease;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center,
          rgba(0, 0, 0, 0) 48%,
          rgba(0, 0, 0, 0.18) 78%,
          rgba(0, 0, 0, 0.42) 100%);
    }

    #launcher {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 24px));
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 0 1px rgba(100, 255, 150, 0.04) inset,
        0 0 24px rgba(50, 180, 90, 0.16);
      z-index: 10;
      text-align: center;
    }

    #launcher.hidden {
      display: none;
    }

    #launcher h1 {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green-main);
      text-shadow: 0 0 var(--glow-size) rgba(110, 255, 150, 0.35);
    }

    #launcher p {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(140, 255, 170, 0.78);
    }

    .controls {
      margin: 0 0 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 104px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin: 7px 0;
      font-size: 12px;
      text-align: left;
    }

    .row.toggle {
      grid-template-columns: 1fr auto;
    }

    .value {
      text-align: right;
      color: rgba(140, 255, 170, 0.8);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #80ff9e;
      background: transparent;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #7fff9d;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button, .xr-button {
      border: 1px solid rgba(95, 255, 145, 0.25);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(20, 60, 28, 0.85), rgba(5, 18, 8, 0.95));
      color: var(--green-main);
      padding: 10px 14px;
      font: inherit;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        0 0 16px rgba(70, 200, 105, 0.12),
        inset 0 0 10px rgba(80, 255, 130, 0.08);
      text-shadow: 0 0 var(--glow-size) rgba(110, 255, 150, 0.4);
    }

    button:hover, .xr-button:hover {
      border-color: rgba(120, 255, 160, 0.45);
    }

    #touchHint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(4, 10, 5, 0.70);
      border: 1px solid rgba(90, 255, 140, 0.16);
      color: rgba(145, 255, 175, 0.72);
      font-size: 12px;
      z-index: 4;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    #touchHint.visible {
      opacity: 1;
    }

    @media (max-width: 640px) {
      #launcher {
        top: 8px;
        width: calc(100vw - 16px);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>

  <section id="launcher" class="hidden">
    <h1>Monochrome AR HUD</h1>
    <p>Use WebXR AR when available, or start the fallback simulator.</p>
    <div class="controls">
      <div class="row">
        <label for="brightness">Brightness</label>
        <input id="brightness" type="range" min="0.35" max="1.7" step="0.01" value="1.05" />
        <div class="value" data-value-for="brightness"></div>
      </div>
      <div class="row">
        <label for="contrast">Contrast</label>
        <input id="contrast" type="range" min="0.6" max="2.3" step="0.01" value="1.15" />
        <div class="value" data-value-for="contrast"></div>
      </div>
      <div class="row">
        <label for="glow">Glow</label>
        <input id="glow" type="range" min="0" max="1.4" step="0.01" value="0.45" />
        <div class="value" data-value-for="glow"></div>
      </div>
      <div class="row">
        <label for="lineThickness">HUD Scale</label>
        <input id="lineThickness" type="range" min="0.4" max="2.6" step="0.01" value="1.2" />
        <div class="value" data-value-for="lineThickness"></div>
      </div>
      <div class="row toggle">
        <label for="scanlineToggle">Scanlines</label>
        <input id="scanlineToggle" type="checkbox" checked />
      </div>
    </div>
    <div class="buttons">
      <button id="startSimButton">Start Simulator</button>
      <div id="xrButtonHost"></div>
    </div>
  </section>
  <div id="touchHint">Drag to look around.</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.164.1/build/three.module.js';
    import { ARButton } from 'https://unpkg.com/three@0.164.1/examples/jsm/webxr/ARButton.js';

    const app = document.getElementById('app');
    const launcher = document.getElementById('launcher');
    const touchHint = document.getElementById('touchHint');
    const xrButtonHost = document.getElementById('xrButtonHost');
    const scanlinesEl = document.getElementById('scanlines');

    const controls = {
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      glow: document.getElementById('glow'),
      lineThickness: document.getElementById('lineThickness'),
      scanlines: document.getElementById('scanlineToggle'),
      startSimButton: document.getElementById('startSimButton'),
    };

    const appearance = {
      brightness: 1.05,
      contrast: 1.15,
      glow: 0.45,
      lineThickness: 1.2,
      scanlines: true,
      wireframe: true,
    };

    const HUD_WIDTH = 640;
    const HUD_HEIGHT = 480;
    const HUD_DISTANCE = 1.5;
    const HUD_HORIZONTAL_FOV_DEG = 30;
    const HUD_WORLD_WIDTH = 2 * HUD_DISTANCE * Math.tan(THREE.MathUtils.degToRad(HUD_HORIZONTAL_FOV_DEG * 0.5));
    const HUD_WORLD_HEIGHT = HUD_WORLD_WIDTH * (HUD_HEIGHT / HUD_WIDTH);
    const HUD_WORLD_PER_PIXEL_X = HUD_WORLD_WIDTH / HUD_WIDTH;
    const HUD_WORLD_PER_PIXEL_Y = HUD_WORLD_HEIGHT / HUD_HEIGHT;
    const HUD_VERTICAL_FOV_DEG = THREE.MathUtils.radToDeg(
      2 * Math.atan((HUD_WORLD_HEIGHT * 0.5) / HUD_DISTANCE)
    );

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(HUD_VERTICAL_FOV_DEG, window.innerWidth / window.innerHeight, 0.01, 60);
    camera.position.set(0, 1.6, 0);

    const tempColor = new THREE.Color();
    const clock = new THREE.Clock();
    const timeState = { elapsed: 0 };

    let fallbackModeActive = false;
    let xrSupported = false;
    let rendererCanvasFilter = '';
    let fakeBatteryLevel = 0.82;
    let headingReferenceDeg = null;

    const hud = createHud();
    setupControls();
    setupXRButton();
    startLoop();

    function formatValue(value) {
      return Number(value).toFixed(2);
    }

    function updateValueLabels() {
      for (const [key, input] of Object.entries({
        brightness: controls.brightness,
        contrast: controls.contrast,
        glow: controls.glow,
        lineThickness: controls.lineThickness,
      })) {
        const target = document.querySelector(`[data-value-for="${key}"]`);
        if (target) target.textContent = formatValue(input.value);
      }
    }

    function updateAppearanceFromUI() {
      appearance.brightness = parseFloat(controls.brightness.value);
      appearance.contrast = parseFloat(controls.contrast.value);
      appearance.glow = parseFloat(controls.glow.value);
      appearance.lineThickness = parseFloat(controls.lineThickness.value);
      appearance.scanlines = controls.scanlines.checked;
      applyMonochromeAppearance();
      updateValueLabels();
    }

    function clamp01(v) {
      return Math.min(1, Math.max(0, v));
    }

    function normalize360(deg) {
      return (deg % 360 + 360) % 360;
    }

    function normalizeSigned180(deg) {
      return ((deg + 540) % 360) - 180;
    }

    function computeGreenPalette() {
      const brightness = appearance.brightness;
      const contrast = appearance.contrast;
      const glow = appearance.glow;

      const core = clamp01(0.55 * contrast + 0.25 * brightness);
      const mid = clamp01(0.35 * contrast + 0.28 * brightness);
      const glowMix = clamp01(0.18 + glow * 0.32);

      return {
        line: tempColor.setRGB(0.08 * brightness, core, 0.18 * brightness).clone(),
        mesh: tempColor.setRGB(0.05 * brightness, mid, 0.13 * brightness).clone(),
        glow: tempColor.setRGB(0.07 * brightness, clamp01(core + glowMix * 0.28), 0.14 * brightness).clone(),
      };
    }

    function applyMonochromeAppearance() {
      const glowPx = `${Math.round(4 + appearance.glow * 18)}px`;
      document.documentElement.style.setProperty('--glow-size', glowPx);
      document.documentElement.style.setProperty('--scanline-opacity', (appearance.scanlines ? 0.04 + appearance.glow * 0.08 : 0).toFixed(2));
      scanlinesEl.style.opacity = appearance.scanlines ? getComputedStyle(document.documentElement).getPropertyValue('--scanline-opacity') : '0';

      // Lightweight full-canvas tuning for the fallback renderer.
      const brightnessCss = (0.85 + appearance.brightness * 0.25).toFixed(2);
      const contrastCss = (0.85 + appearance.contrast * 0.35).toFixed(2);
      const saturateCss = '0';
      const dropShadowPx = Math.round(appearance.glow * 12);
      rendererCanvasFilter = `brightness(${brightnessCss}) contrast(${contrastCss}) saturate(${saturateCss}) drop-shadow(0 0 ${dropShadowPx}px rgba(90,255,140,0.35))`;
      renderer.domElement.style.filter = fallbackModeActive ? rendererCanvasFilter : '';
    }
    function hudColorString(color, alpha = 1) {
      return `rgba(${Math.round(color.r * 255)}, ${Math.round(color.g * 255)}, ${Math.round(color.b * 255)}, ${alpha})`;
    }

    function drawHudBox(ctx, x, y, w, h, text, palette, fontScale = 1) {
      const strokeWidth = 2.4 + appearance.lineThickness * 2.2;
      const fontSize = (18 + appearance.lineThickness * 5) * fontScale;
      ctx.save();
      ctx.strokeStyle = hudColorString(palette.mesh, 0.22);
      ctx.lineWidth = strokeWidth;
      ctx.strokeRect(x, y, w, h);
      ctx.shadowColor = hudColorString(palette.glow, 0.35);
      ctx.shadowBlur = 10 + appearance.glow * 14;
      ctx.fillStyle = hudColorString(palette.line, 0.95);
      ctx.font = `bold ${fontSize}px Courier New`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, x + w / 2, y + h / 2 + 1);
      ctx.restore();
    }

    function drawHudLine(ctx, x1, y1, x2, y2, width, palette, alpha = 1) {
      ctx.save();
      ctx.strokeStyle = hudColorString(palette.line, alpha);
      ctx.lineWidth = width;
      ctx.lineCap = 'butt';
      ctx.shadowColor = hudColorString(palette.glow, 0.32);
      ctx.shadowBlur = 8 + appearance.glow * 12;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function createHud() {
      const canvas = document.createElement('canvas');
      canvas.width = HUD_WIDTH;
      canvas.height = HUD_HEIGHT;
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.NearestFilter;
      texture.magFilter = THREE.NearestFilter;
      texture.generateMipmaps = false;

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
      });
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(HUD_WORLD_WIDTH, HUD_WORLD_HEIGHT),
        material
      );
      mesh.position.set(0, 0, -HUD_DISTANCE);
      camera.add(mesh);
      scene.add(camera);

      return {
        canvas,
        ctx: canvas.getContext('2d'),
        texture,
        mesh,
      };
    }

    function setupControls() {
      updateAppearanceFromUI();
      Object.values({
        brightness: controls.brightness,
        contrast: controls.contrast,
        glow: controls.glow,
        lineThickness: controls.lineThickness,
      }).forEach((input) => input.addEventListener('input', updateAppearanceFromUI));
      controls.scanlines.addEventListener('change', updateAppearanceFromUI);
      controls.startSimButton.addEventListener('click', () => {
        startFallbackMode();
      });

      setupPointerLook();
    }

    async function setupXRButton() {
      if (!navigator.xr) {
        xrButtonHost.innerHTML = '<button type="button" disabled>AR Not Available</button>';
        return;
      }

      xrSupported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);

      if (!xrSupported) {
        xrButtonHost.innerHTML = '<button type="button" disabled>AR Unsupported</button>';
        return;
      }

      const button = ARButton.createButton(renderer, {
        requiredFeatures: [],
        optionalFeatures: ['dom-overlay', 'local-floor'],
        domOverlay: { root: document.body },
      });
      button.classList.add('xr-button');
      button.textContent = 'Enter AR';
      xrButtonHost.appendChild(button);

      renderer.xr.addEventListener('sessionstart', () => {
        fallbackModeActive = false;
        headingReferenceDeg = null;
        launcher.classList.add('hidden');
        renderer.domElement.style.filter = '';
        scene.background = null;
      });

      renderer.xr.addEventListener('sessionend', () => {
        launcher.classList.remove('hidden');
        touchHint.classList.toggle('visible', fallbackModeActive);
        renderer.domElement.style.filter = fallbackModeActive ? rendererCanvasFilter : '';
        scene.background = fallbackModeActive ? new THREE.Color(0x010301) : null;
      });
    }

    function startFallbackMode() {
      fallbackModeActive = true;
      headingReferenceDeg = null;
      launcher.classList.add('hidden');
      touchHint.classList.add('visible');
      scene.background = new THREE.Color(0x010301);
      renderer.domElement.style.filter = rendererCanvasFilter;
    }

    function startLoop() {
      renderer.setAnimationLoop(renderFrame);
    }

    function renderFrame() {
      const dt = clock.getDelta();
      timeState.elapsed += dt;

      updateHud();
      renderer.render(scene, camera);
    }

    function updateHud() {
      const worldDirection = new THREE.Vector3();
      camera.getWorldDirection(worldDirection);
      const headingDeg = normalize360(Math.atan2(worldDirection.x, worldDirection.z) * THREE.MathUtils.RAD2DEG);
      if (headingReferenceDeg === null) headingReferenceDeg = headingDeg;
      const relativeHeadingDeg = normalizeSigned180(headingDeg - headingReferenceDeg);

      const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
      const pitch = euler.x;
      const roll = euler.z;

      const displayHeadingDeg = Math.round(normalize360(relativeHeadingDeg));
      const pitchDeg = Math.round(THREE.MathUtils.radToDeg(pitch));
      const rollDeg = Math.round(THREE.MathUtils.radToDeg(roll));
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      fakeBatteryLevel = 0.78 + Math.sin(timeState.elapsed * 0.12) * 0.04;
      const ctx = hud.ctx;
      const palette = computeGreenPalette();
      const lineWidth = Math.max(6, appearance.lineThickness * 4.5);
      const bottomY = 410;
      const tapeY = 118;
      const tapeLeft = 92;
      const tapeRight = 548;
      const pixelsPerDegree = 3.4;

      ctx.clearRect(0, 0, HUD_WIDTH, HUD_HEIGHT);

      // Crosshair
      drawHudLine(ctx, 282, 240, 310, 240, lineWidth, palette);
      drawHudLine(ctx, 330, 240, 358, 240, lineWidth, palette);
      drawHudLine(ctx, 320, 202, 320, 230, lineWidth, palette);
      drawHudLine(ctx, 320, 250, 320, 278, lineWidth, palette);

      // Heading tape
      for (let degreeOffset = -120; degreeOffset <= 120; degreeOffset += 10) {
        const x = 320 + (degreeOffset - relativeHeadingDeg) * pixelsPerDegree;
        if (x < tapeLeft || x > tapeRight) continue;
        const isMajor = degreeOffset % 30 === 0;
        drawHudLine(ctx, x, tapeY - 10, x, tapeY + (isMajor ? 28 : 16), lineWidth, palette, 0.92);
        if (isMajor) {
          const labelDeg = normalize360(degreeOffset);
          ctx.save();
          ctx.fillStyle = hudColorString(palette.line, 0.95);
          ctx.shadowColor = hudColorString(palette.glow, 0.32);
          ctx.shadowBlur = 8 + appearance.glow * 12;
          ctx.font = `bold ${18 + appearance.lineThickness * 4}px Courier New`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(labelDeg).padStart(3, '0'), x, tapeY + 46);
          ctx.restore();
        }
      }

      // Horizon
      ctx.save();
      ctx.translate(320, 258 + THREE.MathUtils.clamp(pitch * 118, -82, 82));
      ctx.rotate(-roll);
      drawHudLine(ctx, -190, 0, -48, 0, lineWidth, palette);
      drawHudLine(ctx, 48, 0, 190, 0, lineWidth, palette);
      drawHudLine(ctx, -42, -18, -42, 18, lineWidth, palette);
      drawHudLine(ctx, 42, -18, 42, 18, lineWidth, palette);
      ctx.restore();

      // Bottom data row
      drawHudBox(ctx, 12, bottomY, 148, 44, `${hh}:${mm}:${ss}`, palette, 0.88);
      drawHudBox(ctx, 168, bottomY, 116, 44, `HDG ${String(displayHeadingDeg).padStart(3, '0')}`, palette, 0.92);
      drawHudBox(ctx, 292, bottomY, 116, 44, `PIT ${pitchDeg >= 0 ? '+' : '-'}${String(Math.abs(pitchDeg)).padStart(2, '0')}`, palette, 0.92);
      drawHudBox(ctx, 416, bottomY, 116, 44, `ROL ${rollDeg >= 0 ? '+' : '-'}${String(Math.abs(rollDeg)).padStart(2, '0')}`, palette, 0.92);
      drawHudBox(ctx, 540, bottomY, 88, 44, `BAT ${(fakeBatteryLevel * 100).toFixed(0)}%`, palette, 0.72);

      // Keep the floating HUD stable in front of the viewer in both simulator and XR.
      hud.mesh.position.set(0, 0, -HUD_DISTANCE);
      hud.texture.needsUpdate = true;
    }

    function setupPointerLook() {
      const state = {
        dragging: false,
        pointerId: null,
        lastX: 0,
        lastY: 0,
        yaw: 0,
        pitch: -0.05,
      };

      const canvas = renderer.domElement;

      function onPointerDown(event) {
        if (!fallbackModeActive) return;
        state.dragging = true;
        state.pointerId = event.pointerId;
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        canvas.setPointerCapture(event.pointerId);
      }

      function onPointerMove(event) {
        if (!fallbackModeActive || !state.dragging || event.pointerId !== state.pointerId) return;
        const dx = event.clientX - state.lastX;
        const dy = event.clientY - state.lastY;
        state.lastX = event.clientX;
        state.lastY = event.clientY;

        state.yaw -= dx * 0.004;
        state.pitch -= dy * 0.003;
        state.pitch = THREE.MathUtils.clamp(state.pitch, -1.1, 1.1);
        camera.rotation.set(state.pitch, state.yaw, 0, 'YXZ');
      }

      function onPointerUp(event) {
        if (event.pointerId === state.pointerId) {
          state.dragging = false;
          canvas.releasePointerCapture(event.pointerId);
        }
      }

      canvas.addEventListener('pointerdown', onPointerDown);
      canvas.addEventListener('pointermove', onPointerMove);
      canvas.addEventListener('pointerup', onPointerUp);
      canvas.addEventListener('pointercancel', onPointerUp);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
